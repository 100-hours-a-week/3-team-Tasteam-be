name: Backend Feature CI - Quick Check

on:
  push:
    branches:
      - feat/**
      - hotfix/**

jobs:
  quick-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper/dists
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle', '**/*.gradle.kts', 'gradle.properties', 'settings.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Detect changed modules
        id: changed-modules
        shell: bash
        run: |
          set -euo pipefail

          BASE_SHA="${{ github.event.before }}"
          HEAD_SHA="${{ github.sha }}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          fi

          if [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ] || [ -z "$BASE_SHA" ]; then
            BASE_SHA=$(git rev-parse "${HEAD_SHA}^" 2>/dev/null || true)
          fi
          if [ -z "$BASE_SHA" ]; then
            CHANGED_FILES=""
          else
            CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" || true)
          fi

          echo "changed_files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGED_FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          app_changed=false
          other_changed=false

          if [ -n "$CHANGED_FILES" ]; then
            while IFS= read -r file; do
              [ -z "$file" ] && continue
              if [[ "$file" == module-app/* ]]; then
                app_changed=true
              else
                other_changed=true
              fi
            done <<< "$CHANGED_FILES"
          fi

          if [ "$app_changed" = "true" ] && [ "$other_changed" = "false" ]; then
            echo "app_only=true" >> "$GITHUB_OUTPUT"
          else
            echo "app_only=false" >> "$GITHUB_OUTPUT"
          fi
          echo "app_changed=$app_changed" >> "$GITHUB_OUTPUT"
          echo "other_changed=$other_changed" >> "$GITHUB_OUTPUT"

      # 1주차 생략
      # formatting
      #      - name: Run Spotless Check
      #        run: ./gradlew spotlessCheck

      # 1주차 생략
      # convention
      #      - name: Run Checkstyle
      #        run: ./gradlew checkstyleMain checkstyleTest

      # 빌드
      - name: Build with Gradle
        run: ./gradlew --parallel --build-cache build -x test -x spotlessCheck

      - name: Run app module tests only
        if: steps.changed-modules.outputs.app_only == 'true'
        run: ./gradlew --parallel --build-cache :module-app:api:test :module-app:admin:test :module-app:batch:test

      # Feature 브랜치에서는 테스트와 SonarCloud 생략

      # CI 결과 알림 (실패 시에만)
      # 테스트 실패 디스코드 알림
      - name: Notify Test Failure
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{
                 "embeds": [{
                   "title": "백엔드 테스트 실패 💔",
                   "color": 16711680,
                   "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                   "fields": [
                     {"name": "결과", "value": "실패", "inline": true},
                     {"name": "브랜치", "value": "${{ github.ref_name }}", "inline": true},
                     {"name": "작성자", "value": "${{ github.actor }}", "inline": true},
                     {"name": "커밋", "value": "`${{ github.sha }}`", "inline": false},
                     {"name": "워크플로우", "value": "[실행 로그 보기](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": false}
                   ]
                 }]
               }' \
               ${{ secrets.DISCORD_WEBHOOK_URL }}
