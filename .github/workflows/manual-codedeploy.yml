name: Backend Manual Deploy (CodeDeploy)

on:
  workflow_dispatch:
    inputs:
      run_tests:
        description: '배포 전 테스트 실행 여부'
        required: true
        type: boolean
        default: true

permissions:
  id-token: write
  contents: read

concurrency:
  group: codedeploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}
    timeout-minutes: 30

    env:
      AWS_REGION: ap-northeast-2
      DEPLOY_DIR: deploy/codedeploy/backend
      ARTIFACT_FILE: codedeploy-backend-${{ github.sha }}.zip
      IMAGE_TAG_SHA: ${{ github.sha }}
      IMAGE_TAG_LATEST: latest
      DEPLOY_ENV_NAME: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}
      DEPLOYMENT_CONFIG_NAME: ${{ github.ref_name == 'main' && 'CodeDeployDefault.OneAtATime' || 'CodeDeployDefault.AllAtOnce' }}
      GHA_CACHE_SCOPE: ${{ github.ref_name == 'main' && 'backend-codedeploy-prod' || 'backend-codedeploy-dev' }}

    steps:
      - name: Validate target branch
        run: |
          set -euo pipefail
          case "${GITHUB_REF_NAME}" in
            main|develop)
              echo "target branch: ${GITHUB_REF_NAME}"
              ;;
            *)
              echo "manual deploy is only supported on main or develop. current=${GITHUB_REF_NAME}" >&2
              exit 1
              ;;
          esac

      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        if: ${{ inputs.run_tests }}
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        if: ${{ inputs.run_tests }}
        uses: gradle/gradle-build-action@v2

      - name: Run tests
        if: ${{ inputs.run_tests }}
        run: ./gradlew test

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image (with GHA cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: app-api/Dockerfile
          push: true
          tags: |
            ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY_BACKEND }}:${{ env.IMAGE_TAG_SHA }}
            ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY_BACKEND }}:${{ env.IMAGE_TAG_LATEST }}
          cache-from: type=gha,scope=${{ env.GHA_CACHE_SCOPE }}
          cache-to: type=gha,mode=max,scope=${{ env.GHA_CACHE_SCOPE }}

      - name: Package CodeDeploy artifact
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          ECR_REPO_BACKEND: ${{ secrets.ECR_REPOSITORY_BACKEND }}
        run: |
          set -euo pipefail
          cd "${DEPLOY_DIR}"
          [ -n "${ECR_REGISTRY}" ] && [ -n "${ECR_REPO_BACKEND}" ] || { echo "ECR_REGISTRY/ECR_REPO_BACKEND secret is required"; exit 1; }
          cat > .env.deploy <<EODEPLOY
          ENV_NAME=${DEPLOY_ENV_NAME}
          AWS_REGION=${AWS_REGION}
          ECR_REGISTRY=${ECR_REGISTRY}
          ECR_REPO_BACKEND=${ECR_REPO_BACKEND}
          IMAGE_TAG=${IMAGE_TAG_SHA}
          EODEPLOY

          chmod +x deploy.sh stop.sh health.sh traffic.sh switch.sh rollback.sh
          zip -r "${GITHUB_WORKSPACE}/${ARTIFACT_FILE}" \
            appspec.yml \
            deploy.sh \
            stop.sh \
            health.sh \
            traffic.sh \
            switch.sh \
            rollback.sh \
            docker-compose.backend.yml \
            docker-compose.dev-infra.yml \
            docker-compose.alloy.yml \
            alloy/ \
            .env.deploy \
            RUNBOOK.md

      - name: Upload artifact to S3
        env:
          CODEDEPLOY_BUCKET: ${{ secrets.CODEDEPLOY_ARTIFACT_BUCKET }}
        run: |
          set -euo pipefail
          aws s3 cp "${ARTIFACT_FILE}" "s3://${CODEDEPLOY_BUCKET}/backend/${ARTIFACT_FILE}"

      - name: Trigger CodeDeploy deployment
        id: trigger
        env:
          CODEDEPLOY_BUCKET: ${{ secrets.CODEDEPLOY_ARTIFACT_BUCKET }}
          CODEDEPLOY_APP_NAME: ${{ secrets.CODEDEPLOY_APP_NAME }}
          CODEDEPLOY_DEPLOYMENT_GROUP: ${{ secrets.CODEDEPLOY_DEPLOYMENT_GROUP }}
        run: |
          set -euo pipefail
          DEPLOYMENT_ID=$(aws deploy create-deployment \
            --application-name "${CODEDEPLOY_APP_NAME}" \
            --deployment-group-name "${CODEDEPLOY_DEPLOYMENT_GROUP}" \
            --deployment-config-name "${DEPLOYMENT_CONFIG_NAME}" \
            --description "Manual deploy ${GITHUB_SHA}" \
            --s3-location bucket="${CODEDEPLOY_BUCKET}",key="backend/${ARTIFACT_FILE}",bundleType=zip \
            --query deploymentId \
            --output text)

          echo "deployment_id=${DEPLOYMENT_ID}" >> "$GITHUB_OUTPUT"
          {
            echo "### Manual CodeDeploy"
            echo "- branch: \`${GITHUB_REF_NAME}\`"
            echo "- environment: \`${DEPLOY_ENV_NAME}\`"
            echo "- tests: \`${{ inputs.run_tests }}\`"
            echo "- commit: \`${GITHUB_SHA}\`"
            echo "- deployment id: \`${DEPLOYMENT_ID}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Wait deployment result
        env:
          DEPLOYMENT_ID: ${{ steps.trigger.outputs.deployment_id }}
        run: |
          set -euo pipefail
          aws deploy wait deployment-successful --deployment-id "${DEPLOYMENT_ID}"
          aws deploy get-deployment --deployment-id "${DEPLOYMENT_ID}" --query 'deploymentInfo.status' --output text

      - name: Notify deployment result
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            TITLE="백엔드 수동 배포 성공 💗"
            COLOR=65280
          else
            TITLE="백엔드 수동 배포 실패 💔💀"
            COLOR=16711680
          fi

          curl -H "Content-Type: application/json" \
               -X POST \
               -d "{
                 \"embeds\": [{
                   \"title\": \"$TITLE\",
                   \"color\": $COLOR,
                   \"url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
                   \"fields\": [
                     {\"name\": \"결과\", \"value\": \"${{ job.status }}\", \"inline\": true},
                     {\"name\": \"브랜치\", \"value\": \"${{ github.ref_name }}\", \"inline\": true},
                     {\"name\": \"실행자\", \"value\": \"${{ github.actor }}\", \"inline\": true},
                     {\"name\": \"테스트 실행\", \"value\": \"${{ inputs.run_tests }}\", \"inline\": true},
                     {\"name\": \"커밋\", \"value\": \"\`${{ github.sha }}\`\", \"inline\": false},
                     {\"name\": \"서버 환경\", \"value\": \"${{ github.ref_name == 'main' && '운영' || '개발' }} 서버\", \"inline\": false},
                     {\"name\": \"워크플로우\", \"value\": \"[실행 로그 보기](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\", \"inline\": false}
                   ]
                 }]
               }" \
               ${{ secrets.DISCORD_WEBHOOK_URL }}
