name: Backend Manual Deploy (CodeDeploy)

on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: '배포할 소스 브랜치'
        required: true
        type: choice
        default: main
        options:
          - develop
          - main
      target_environment:
        description: '배포 대상 환경'
        required: true
        type: choice
        default: stg
        options:
          - prod
          - stg
          - develop
      run_tests:
        description: '배포 전 테스트 실행 여부'
        required: true
        type: boolean
        default: true

permissions:
  id-token: write
  contents: read

concurrency:
  group: codedeploy-${{ inputs.target_environment }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_environment == 'prod' && 'production' || (inputs.target_environment == 'stg' && 'staging' || 'development') }}
    timeout-minutes: 30

    env:
      AWS_REGION: ap-northeast-2
      DEPLOY_DIR: deploy/codedeploy/backend
      IMAGE_TAG_LATEST: latest
      DEPLOY_ENV_NAME: ${{ inputs.target_environment == 'develop' && 'dev' || inputs.target_environment }}
      DEPLOYMENT_CONFIG_NAME: ${{ inputs.target_environment == 'prod' && 'CodeDeployDefault.OneAtATime' || 'CodeDeployDefault.AllAtOnce' }}
      GHA_CACHE_SCOPE: ${{ inputs.target_environment == 'develop' && 'backend-codedeploy-dev' || format('backend-codedeploy-{0}', inputs.target_environment) }}
      TARGET_ENV_LABEL: ${{ inputs.target_environment == 'prod' && '운영' || (inputs.target_environment == 'stg' && '스테이징' || '개발') }}

    steps:
      - name: Validate deploy request
        run: |
          set -euo pipefail
          case "${{ inputs.source_branch }}" in
            develop|main)
              echo "source branch: ${{ inputs.source_branch }}"
              ;;
            *)
              echo "manual deploy is only supported on develop or main. current=${{ inputs.source_branch }}" >&2
              exit 1
              ;;
          esac

          case "${{ inputs.target_environment }}" in
            prod|stg|develop)
              echo "target environment: ${{ inputs.target_environment }}"
              ;;
            *)
              echo "manual deploy is only supported on prod, stg or develop. current=${{ inputs.target_environment }}" >&2
              exit 1
              ;;
          esac

      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_branch }}

      - name: Resolve source metadata
        id: source
        run: |
          set -euo pipefail
          SOURCE_SHA="$(git rev-parse HEAD)"
          echo "source_sha=${SOURCE_SHA}" >> "$GITHUB_OUTPUT"
          echo "artifact_file=codedeploy-backend-${SOURCE_SHA}.zip" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 21
        if: ${{ inputs.run_tests }}
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        if: ${{ inputs.run_tests }}
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        if: ${{ inputs.run_tests }}
        run: ./gradlew --parallel --build-cache test

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image (with GHA cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: module-app/api/Dockerfile
          push: true
          tags: |
            ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY_BACKEND }}:${{ steps.source.outputs.source_sha }}
            ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY_BACKEND }}:${{ env.IMAGE_TAG_LATEST }}
          cache-from: type=gha,scope=${{ env.GHA_CACHE_SCOPE }}
          cache-to: type=gha,mode=max,scope=${{ env.GHA_CACHE_SCOPE }}

      - name: Package CodeDeploy artifact
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          ECR_REPO_BACKEND: ${{ secrets.ECR_REPOSITORY_BACKEND }}
        run: |
          set -euo pipefail
          cd "${DEPLOY_DIR}"
          [ -n "${ECR_REGISTRY}" ] && [ -n "${ECR_REPO_BACKEND}" ] || { echo "ECR_REGISTRY/ECR_REPO_BACKEND secret is required"; exit 1; }
          cat > .env.deploy <<EODEPLOY
          ENV_NAME=${DEPLOY_ENV_NAME}
          AWS_REGION=${AWS_REGION}
          ECR_REGISTRY=${ECR_REGISTRY}
          ECR_REPO_BACKEND=${ECR_REPO_BACKEND}
          IMAGE_TAG=${{ steps.source.outputs.source_sha }}
<<<<<<< HEAD
          HEALTH_RETRIES=120
=======
          HEALTH_RETRIES=75
>>>>>>> ffb956cd (🔁 ci: CodeDeploy 헬스체크 리트라이 횟수 증가 (45→75))
          EODEPLOY

          chmod +x deploy.sh stop.sh health.sh traffic.sh switch.sh rollback.sh
          zip -r "${GITHUB_WORKSPACE}/${{ steps.source.outputs.artifact_file }}" \
            appspec.yml \
            deploy.sh \
            stop.sh \
            health.sh \
            traffic.sh \
            switch.sh \
            rollback.sh \
            docker-compose.backend.yml \
            docker-compose.dev-infra.yml \
            docker-compose.alloy.yml \
            alloy/ \
            .env.deploy \
            RUNBOOK.md

      - name: Upload artifact to S3
        env:
          CODEDEPLOY_BUCKET: ${{ secrets.CODEDEPLOY_ARTIFACT_BUCKET }}
        run: |
          set -euo pipefail
          aws s3 cp "${{ steps.source.outputs.artifact_file }}" "s3://${CODEDEPLOY_BUCKET}/backend/${{ steps.source.outputs.artifact_file }}"

      - name: Trigger CodeDeploy deployment
        id: trigger
        env:
          CODEDEPLOY_BUCKET: ${{ secrets.CODEDEPLOY_ARTIFACT_BUCKET }}
          CODEDEPLOY_APP_NAME: ${{ secrets.CODEDEPLOY_APP_NAME }}
          CODEDEPLOY_DEPLOYMENT_GROUP: ${{ secrets.CODEDEPLOY_DEPLOYMENT_GROUP }}
        run: |
          set -euo pipefail
          DEPLOYMENT_ID=$(aws deploy create-deployment \
            --application-name "${CODEDEPLOY_APP_NAME}" \
            --deployment-group-name "${CODEDEPLOY_DEPLOYMENT_GROUP}" \
            --deployment-config-name "${DEPLOYMENT_CONFIG_NAME}" \
            --description "Manual deploy ${{ inputs.source_branch }}@${{ steps.source.outputs.source_sha }} to ${DEPLOY_ENV_NAME}" \
            --s3-location bucket="${CODEDEPLOY_BUCKET}",key="backend/${{ steps.source.outputs.artifact_file }}",bundleType=zip \
            --file-exists-behavior OVERWRITE \
            --query deploymentId \
            --output text)

          echo "deployment_id=${DEPLOYMENT_ID}" >> "$GITHUB_OUTPUT"
          {
            echo "### Manual CodeDeploy"
            echo "- source branch: \`${{ inputs.source_branch }}\`"
            echo "- environment: \`${DEPLOY_ENV_NAME}\`"
            echo "- application: \`${CODEDEPLOY_APP_NAME}\`"
            echo "- deployment group: \`${CODEDEPLOY_DEPLOYMENT_GROUP}\`"
            echo "- tests: \`${{ inputs.run_tests }}\`"
            echo "- commit: \`${{ steps.source.outputs.source_sha }}\`"
            echo "- deployment id: \`${DEPLOYMENT_ID}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Wait deployment result
        env:
          DEPLOYMENT_ID: ${{ steps.trigger.outputs.deployment_id }}
        run: |
          set -euo pipefail
          aws deploy wait deployment-successful --deployment-id "${DEPLOYMENT_ID}"
          aws deploy get-deployment --deployment-id "${DEPLOYMENT_ID}" --query 'deploymentInfo.status' --output text

      - name: Notify deployment result
        if: always()
        env:
          CODEDEPLOY_DEPLOYMENT_GROUP: ${{ secrets.CODEDEPLOY_DEPLOYMENT_GROUP }}
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            TITLE="백엔드 ${TARGET_ENV_LABEL} 수동 배포 성공 💗"
            COLOR=65280
          else
            TITLE="백엔드 ${TARGET_ENV_LABEL} 수동 배포 실패 💔💀"
            COLOR=16711680
          fi

          curl -H "Content-Type: application/json" \
               -X POST \
               -d "{
                 \"embeds\": [{
                   \"title\": \"$TITLE\",
                   \"color\": $COLOR,
                   \"url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
                   \"fields\": [
                     {\"name\": \"결과\", \"value\": \"${{ job.status }}\", \"inline\": true},
                     {\"name\": \"소스 브랜치\", \"value\": \"${{ inputs.source_branch }}\", \"inline\": true},
                     {\"name\": \"실행자\", \"value\": \"${{ github.actor }}\", \"inline\": true},
                     {\"name\": \"테스트 실행\", \"value\": \"${{ inputs.run_tests }}\", \"inline\": true},
                     {\"name\": \"커밋\", \"value\": \"\`${{ steps.source.outputs.source_sha }}\`\", \"inline\": false},
                     {\"name\": \"서버 환경\", \"value\": \"${TARGET_ENV_LABEL} 서버\", \"inline\": false},
                     {\"name\": \"Deployment Group\", \"value\": \"\`${CODEDEPLOY_DEPLOYMENT_GROUP}\`\", \"inline\": false},
                     {\"name\": \"워크플로우\", \"value\": \"[실행 로그 보기](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\", \"inline\": false}
                   ]
                 }]
               }" \
               ${{ secrets.DISCORD_WEBHOOK_URL }}
