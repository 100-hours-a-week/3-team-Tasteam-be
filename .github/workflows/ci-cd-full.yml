name: Backend CI/CD - Full Pipeline

on:
  push:
    branches:
      - develop
      - main
    paths-ignore:
      - "**/*.md"
  pull_request:
    branches:
      - develop
      - main
    paths-ignore:
      - "**/*.md"

jobs:
  # PR 시에만 테스트 실행
  test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Detect changed modules
        id: changed-modules
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail

          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.sha }}"

          CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" || true)

          echo "changed_files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGED_FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          app_changed=false
          other_changed=false

          if [ -n "$CHANGED_FILES" ]; then
            while IFS= read -r file; do
              [ -z "$file" ] && continue
              if [[ "$file" == module-app/* ]]; then
                app_changed=true
              else
                other_changed=true
              fi
            done <<< "$CHANGED_FILES"
          fi

          if [ "$app_changed" = "true" ] && [ "$other_changed" = "false" ]; then
            echo "app_only=true" >> "$GITHUB_OUTPUT"
          else
            echo "app_only=false" >> "$GITHUB_OUTPUT"
          fi

      # 테스트 실행
      - name: Run Tests
        if: steps.changed-modules.outputs.app_only != 'true'
        run: ./gradlew --parallel --build-cache test

      - name: Run app module tests only
        if: steps.changed-modules.outputs.app_only == 'true'
        run: ./gradlew --parallel --build-cache :module-app:api:test :module-app:admin:test :module-app:batch:test

      # 테스트 실패 디스코드 알림
      - name: Notify Test Failure
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{
                 "embeds": [{
                   "title": "백엔드 테스트 실패 ❌",
                   "color": 16711680,
                   "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                   "fields": [
                     {"name": "결과", "value": "실패", "inline": true},
                     {"name": "브랜치", "value": "${{ github.ref_name }}", "inline": true},
                     {"name": "작성자", "value": "${{ github.actor }}", "inline": true},
                     {"name": "커밋", "value": "`${{ github.sha }}`", "inline": false},
                     {"name": "이벤트", "value": "PR 테스트", "inline": false},
                     {"name": "워크플로우", "value": "[실행 로그 보기](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": false}
                   ]
                 }]
               }' \
               ${{ secrets.DISCORD_WEBHOOK_URL }}

  # PR 시에만 보안 검사 실행
  security-scan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # CodeQL 보안 분석 - 빌드 전에 초기화
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java
          queries: security-and-quality

      # 메인 코드 컴파일 (보안 분석용)
      - name: Compile Main Sources
        run: ./gradlew --no-build-cache clean classes

      # CodeQL 분석 수행
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:java"

      # 보안 분석 - SpotBugs (메인 코드만 분석)
      - name: Run SpotBugs Security Analysis
        run: ./gradlew --build-cache :module-app:api:spotbugsMain
        continue-on-error: true

      # SpotBugs 리포트 업로드
      - name: Upload SpotBugs Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-report-${{ github.sha }}
          path: module-app/api/build/reports/spotbugs/main/spotbugs.html
          retention-days: 7

      # 보안 스캔 실패 알림 (성공 시 알림 없음)
      - name: Notify Security Scan Failure
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{
                 "embeds": [{
                   "title": "백엔드 보안 스캔 실패 ❌",
                   "color": 16711680,
                   "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                   "fields": [
                     {"name": "결과", "value": "실패", "inline": true},
                     {"name": "브랜치", "value": "${{ github.ref_name }}", "inline": true},
                     {"name": "작성자", "value": "${{ github.actor }}", "inline": true},
                     {"name": "커밋", "value": "`${{ github.sha }}`", "inline": false},
                     {"name": "이벤트", "value": "PR 보안 검사", "inline": false},
                     {"name": "워크플로우", "value": "[실행 로그 보기](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": false}
                   ]
                 }]
               }' \
               ${{ secrets.DISCORD_WEBHOOK_URL }}

  # develop/main push 시에만 CodeDeploy 배포
  deploy:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
    concurrency:
      group: codedeploy-${{ github.ref_name }}
      cancel-in-progress: false

    env:
      AWS_REGION: ap-northeast-2
      DEPLOY_DIR: deploy/codedeploy/backend
      ARTIFACT_FILE: codedeploy-backend-${{ github.sha }}.zip
      IMAGE_TAG_SHA: ${{ github.sha }}
      IMAGE_TAG_LATEST: latest
      DEPLOY_ENV_NAME: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
      DEPLOYMENT_CONFIG_NAME: ${{ github.ref == 'refs/heads/main' && 'CodeDeployDefault.OneAtATime' || 'CodeDeployDefault.AllAtOnce' }}
      GHA_CACHE_SCOPE: ${{ github.ref == 'refs/heads/main' && 'backend-codedeploy-prod' || 'backend-codedeploy-dev' }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image (with GHA cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: module-app/api/Dockerfile
          push: true
          tags: |
            ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY_BACKEND }}:${{ env.IMAGE_TAG_SHA }}
            ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY_BACKEND }}:${{ env.IMAGE_TAG_LATEST }}
          cache-from: type=gha,scope=${{ env.GHA_CACHE_SCOPE }}
          cache-to: type=gha,mode=max,scope=${{ env.GHA_CACHE_SCOPE }}

      - name: Package CodeDeploy artifact
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          ECR_REPO_BACKEND: ${{ secrets.ECR_REPOSITORY_BACKEND }}
        run: |
          set -euo pipefail
          cd "${DEPLOY_DIR}"
          [ -n "${ECR_REGISTRY}" ] && [ -n "${ECR_REPO_BACKEND}" ] || { echo "ECR_REGISTRY/ECR_REPO_BACKEND secret is required"; exit 1; }
          cat > .env.deploy <<EOF
          ENV_NAME=${DEPLOY_ENV_NAME}
          AWS_REGION=${AWS_REGION}
          ECR_REGISTRY=${ECR_REGISTRY}
          ECR_REPO_BACKEND=${ECR_REPO_BACKEND}
          IMAGE_TAG=${IMAGE_TAG_SHA}
          HEALTH_RETRIES=120
          EOF

          chmod +x deploy.sh stop.sh health.sh traffic.sh switch.sh rollback.sh
          zip -r "${GITHUB_WORKSPACE}/${ARTIFACT_FILE}" \
            appspec.yml \
            deploy.sh \
            stop.sh \
            health.sh \
            traffic.sh \
            switch.sh \
            rollback.sh \
            docker-compose.backend.yml \
            docker-compose.dev-infra.yml \
            docker-compose.alloy.yml \
            alloy/ \
            .env.deploy \
            RUNBOOK.md

      - name: Upload artifact to S3
        env:
          CODEDEPLOY_BUCKET: ${{ secrets.CODEDEPLOY_ARTIFACT_BUCKET }}
        run: |
          set -euo pipefail
          aws s3 cp "${ARTIFACT_FILE}" "s3://${CODEDEPLOY_BUCKET}/backend/${ARTIFACT_FILE}"

      - name: Trigger CodeDeploy deployment
        id: trigger
        env:
          CODEDEPLOY_BUCKET: ${{ secrets.CODEDEPLOY_ARTIFACT_BUCKET }}
          CODEDEPLOY_APP_NAME: ${{ secrets.CODEDEPLOY_APP_NAME }}
          CODEDEPLOY_DEPLOYMENT_GROUP: ${{ secrets.CODEDEPLOY_DEPLOYMENT_GROUP }}
        run: |
          set -euo pipefail
          DEPLOYMENT_ID=$(aws deploy create-deployment \
            --application-name "${CODEDEPLOY_APP_NAME}" \
            --deployment-group-name "${CODEDEPLOY_DEPLOYMENT_GROUP}" \
            --deployment-config-name "${DEPLOYMENT_CONFIG_NAME}" \
            --description "Deploy ${GITHUB_SHA}" \
            --s3-location bucket="${CODEDEPLOY_BUCKET}",key="backend/${ARTIFACT_FILE}",bundleType=zip \
            --file-exists-behavior OVERWRITE \
            --query deploymentId \
            --output text)

          echo "deployment_id=${DEPLOYMENT_ID}" >> "$GITHUB_OUTPUT"
          echo "Triggered deployment: ${DEPLOYMENT_ID}"

      - name: Wait deployment result
        env:
          DEPLOYMENT_ID: ${{ steps.trigger.outputs.deployment_id }}
        run: |
          set -euo pipefail
          aws deploy wait deployment-successful --deployment-id "${DEPLOYMENT_ID}"
          aws deploy get-deployment --deployment-id "${DEPLOYMENT_ID}" --query 'deploymentInfo.status' --output text

      # 배포 결과 알림
      - name: Notify Deployment Result
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            TITLE="백엔드 ${{ github.ref == 'refs/heads/main' && '운영' || '개발' }} 서버 배포 성공 💗️"
            COLOR=65280
          else
            TITLE="백엔드 ${{ github.ref == 'refs/heads/main' && '운영' || '개발' }} 서버 배포 실패 💔💀"
            COLOR=16711680
          fi

          curl -H "Content-Type: application/json" \
               -X POST \
               -d "{
                 \"embeds\": [{
                   \"title\": \"$TITLE\",
                   \"color\": $COLOR,
                   \"url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
                   \"fields\": [
                     {\"name\": \"결과\", \"value\": \"${{ job.status }}\", \"inline\": true},
                     {\"name\": \"브랜치\", \"value\": \"${{ github.ref_name }}\", \"inline\": true},
                     {\"name\": \"작성자\", \"value\": \"${{ github.actor }}\", \"inline\": true},
                     {\"name\": \"커밋\", \"value\": \"\`${{ github.sha }}\`\", \"inline\": false},
                     {\"name\": \"서버 환경\", \"value\": \"${{ github.ref == 'refs/heads/main' && '운영' || '개발' }} 서버\", \"inline\": false},
                     {\"name\": \"워크플로우\", \"value\": \"[실행 로그 보기](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\", \"inline\": false}
                   ]
                 }]
               }" \
               ${{ secrets.DISCORD_WEBHOOK_URL }}
