global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: tasteam-api
    scrape_interval: 15s
    metrics_path: /actuator/prometheus
    # OpenMetrics 형식으로 scrape → Exemplar 수집 활성화
    params:
      format: [ openmetrics ]
    static_configs:
      - targets:
          - host.docker.internal:8080
