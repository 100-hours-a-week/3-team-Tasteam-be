## 로컬 모니터링 스택 (Prometheus + Tempo + Grafana)
## 사용법: docker-compose -f docker-compose.local.yml -f docker-compose.monitoring.yml up -d
##
## 접속:
##   Grafana:    http://localhost:3001  (admin / admin)
##   Prometheus: http://localhost:9090
##   Tempo:      http://localhost:3200
##
## 필요 환경변수 (.env.local):
##   TRACING_AOP_ENABLED=true
##   TRACING_TX_ENABLED=true
##   TRACING_ENABLED=true
##   OTEL_ENDPOINT=http://tempo:4318/v1/traces   (api 컨테이너 사용 시)
##   OTEL_ENDPOINT=http://localhost:4318/v1/traces (로컬 직접 실행 시)

services:
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: tasteam-postgres-exporter
    command:
      - --collector.stat_statements
      - --collector.stat_statements.include_query
    environment:
      DATA_SOURCE_URI: ${POSTGRES_EXPORTER_DATA_SOURCE_URI:-db:5432/tasteam?sslmode=disable}
      DATA_SOURCE_USER: ${POSTGRES_EXPORTER_DATA_SOURCE_USER:-tasteam}
      DATA_SOURCE_PASS: ${POSTGRES_EXPORTER_DATA_SOURCE_PASS:-tasteam}
    ports:
      - "9187:9187"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: tasteam-cadvisor
    privileged: true
    ports:
      - "8088:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro

  prometheus:
    image: prom/prometheus:latest
    container_name: tasteam-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --enable-feature=exemplar-storage
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  tempo:
    image: grafana/tempo:latest
    container_name: tasteam-tempo
    command: [ "-config.file=/etc/tempo/config.yaml" ]
    volumes:
      - ./docker/tempo/config.yaml:/etc/tempo/config.yaml
      - tempo_data:/tmp/tempo
    ports:
      - "3200:3200"   # Tempo HTTP UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP

  grafana:
    image: grafana/grafana:latest
    container_name: tasteam-grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_FEATURE_TOGGLES_ENABLE=exemplarTraceIdDestinations traceqlEditor
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - postgres-exporter
      - cadvisor
      - prometheus
      - tempo

volumes:
  prometheus_data:
  tempo_data:
  grafana_data:
