networks:
  tasteam-net:
    name: tasteam-net
    driver: bridge

services:
  db:
    image: postgis/postgis:17-3.4
    networks: [tasteam-net]
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - track_io_timing=on
    environment:
      POSTGRES_DB: ${DB_NAME:-tasteam}
      POSTGRES_USER: ${DB_USERNAME:-tasteam}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tasteam}
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - 3-team-tasteam-be_postgres_data:/var/lib/postgresql/data
      - ./docker/postgis/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    networks: [tasteam-net]
    ports:
      - "6379:6379"
    volumes:
      - app-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: module-app/api/Dockerfile
    image: tasteam-api:local
    networks: [tasteam-net]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.local
    environment:
      SPRING_PROFILES_ACTIVE: local
      SERVER_PORT: 8080
      DB_URL: jdbc:postgresql://db:5432/${DB_NAME:-tasteam}
      DB_USERNAME: ${DB_USERNAME:-tasteam}
      DB_PASSWORD: ${DB_PASSWORD:-tasteam}
      FLYWAY_URL: jdbc:postgresql://db:5432/${DB_NAME:-tasteam}
      FLYWAY_USER: ${DB_USERNAME:-tasteam}
      FLYWAY_PASSWORD: ${DB_PASSWORD:-tasteam}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MQ_ENABLED: false
      MQ_PROVIDER: none
      WEBHOOK_ENABLED: false
      FIREBASE_ENABLED: false
      SENTRY_DSN: ""
      TRACING_ENABLED: false
      TASTEAM_AOP_WEBHOOK_ENABLED: false
      TASTEAM_AOP_TRACING_ENABLED: false
    ports:
      - "8080:8080"
  worker:
    image: busybox:1.36
    networks: [tasteam-net]
    command: ["sh", "-c", "while true; do sleep 3600; done"]

volumes:
  3-team-tasteam-be_postgres_data:
  app-redis-data:
