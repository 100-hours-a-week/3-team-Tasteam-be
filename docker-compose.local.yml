services:
  db:
    image: postgis/postgis:17-3.4

    container_name: tasteam-db
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - track_io_timing=on
    env_file:
      - .env.local
    environment:
      POSTGRES_DB: tasteam
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgis/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d tasteam"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: tasteam-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: app-api/Dockerfile
    image: tasteam-api:local
    container_name: tasteam-api
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.local
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://db:5432/tasteam}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-tasteam}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-tasteam}
      SPRING_FLYWAY_URL: ${SPRING_FLYWAY_URL:-jdbc:postgresql://db:5432/tasteam}
      SPRING_FLYWAY_USER: ${SPRING_FLYWAY_USER:-tasteam}
      SPRING_FLYWAY_PASSWORD: ${SPRING_FLYWAY_PASSWORD:-tasteam}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      TASTEAM_SEARCH_QUERY_STRATEGY: ${TASTEAM_SEARCH_QUERY_STRATEGY:-TWO_STEP}
      TASTEAM_SEARCH_QUERY_CANDIDATE_LIMIT: ${TASTEAM_SEARCH_QUERY_CANDIDATE_LIMIT:-200}

volumes:
  postgres_data:
  redis_data:
