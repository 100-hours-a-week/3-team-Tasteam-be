networks:
  tasteam-module-net:
    name: tasteam-module-net
    driver: bridge

services:
  module-db:
    image: postgis/postgis:17-3.4
    networks: [tasteam-module-net]
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - track_io_timing=on
    environment:
      POSTGRES_DB: ${DB_NAME:-tasteam}
      POSTGRES_USER: ${DB_USERNAME:-tasteam}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tasteam}
      TZ: Asia/Seoul
    volumes:
      - module-app-postgres-data:/var/lib/postgresql/data
      - ./docker/postgis/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  module-redis:
    image: redis:7
    networks: [tasteam-module-net]
    volumes:
      - module-app-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  module-api:
    build:
      context: .
      dockerfile: module-app/api/Dockerfile
    image: tasteam-module-api:local
    networks: [tasteam-module-net]
    depends_on:
      module-db:
        condition: service_healthy
      module-redis:
        condition: service_healthy
    env_file:
      - .env.local
    environment:
      SPRING_PROFILES_ACTIVE: local
      SERVER_PORT: 8080
      DB_URL: jdbc:postgresql://module-db:5432/${DB_NAME:-tasteam}
      DB_USERNAME: ${DB_USERNAME:-tasteam}
      DB_PASSWORD: ${DB_PASSWORD:-tasteam}
      FLYWAY_URL: jdbc:postgresql://module-db:5432/${DB_NAME:-tasteam}
      FLYWAY_USER: ${DB_USERNAME:-tasteam}
      FLYWAY_PASSWORD: ${DB_PASSWORD:-tasteam}
      REDIS_HOST: module-redis
      REDIS_PORT: 6379
      MQ_ENABLED: false
      MQ_PROVIDER: none
      WEBHOOK_ENABLED: false
      FIREBASE_ENABLED: false
      SENTRY_DSN: ""
      TRACING_ENABLED: false
      TASTEAM_AOP_WEBHOOK_ENABLED: false
      TASTEAM_AOP_TRACING_ENABLED: false
    ports:
      - "18080:8080"

  module-batch:
    build:
      context: .
      dockerfile: module-app/batch/Dockerfile
    image: tasteam-module-batch:local
    networks: [tasteam-module-net]
    depends_on:
      module-db:
        condition: service_healthy
      module-redis:
        condition: service_healthy
    env_file:
      - .env.local
    environment:
      SPRING_PROFILES_ACTIVE: local
      SERVER_PORT: 8082
      DB_URL: jdbc:postgresql://module-db:5432/${DB_NAME:-tasteam}
      DB_USERNAME: ${DB_USERNAME:-tasteam}
      DB_PASSWORD: ${DB_PASSWORD:-tasteam}
      FLYWAY_URL: jdbc:postgresql://module-db:5432/${DB_NAME:-tasteam}
      FLYWAY_USER: ${DB_USERNAME:-tasteam}
      FLYWAY_PASSWORD: ${DB_PASSWORD:-tasteam}
      REDIS_HOST: module-redis
      REDIS_PORT: 6379
      MQ_ENABLED: false
      MQ_PROVIDER: none
      WEBHOOK_ENABLED: false
      FIREBASE_ENABLED: false
      SENTRY_DSN: ""
      TRACING_ENABLED: false
      TASTEAM_AOP_WEBHOOK_ENABLED: false
      TASTEAM_AOP_TRACING_ENABLED: false
    ports:
      - "18082:8082"

volumes:
  module-app-postgres-data:
  module-app-redis-data:
