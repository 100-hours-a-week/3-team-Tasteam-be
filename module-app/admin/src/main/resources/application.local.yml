spring:
  config:
    activate:
      on-profile: local
    import:
      - optional:file:../.env.local[.properties]
      - optional:file:.env.local[.properties]

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/tasteam}
    username: ${DB_USERNAME:tasteam}
    password: ${DB_PASSWORD:tasteam}
    hikari:
      connection-timeout: 10000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  jpa:
    hibernate:
      ddl-auto: validate

    properties:
      hibernate:
        format_sql: false
        show_sql: false
        generate_statistics: false

  flyway:
    enabled: true
    url: ${FLYWAY_URL:${DB_URL:jdbc:postgresql://localhost:5432/tasteam}}
    user: ${FLYWAY_USER:${DB_USERNAME:tasteam}}
    password: ${FLYWAY_PASSWORD:${DB_PASSWORD:tasteam}}
    locations: classpath:db/migration
    out-of-order: false
    baseline-on-migrate: false

  sql:
    init:
      mode: never

  security:
    jwt:
      accessTokenExpiration: 600000   # 10분
      refreshTokenExpiration: 1800000 # 30분

logging:
  level:
    org.hibernate.SQL: warn
    org.hibernate.orm.jdbc.bind: warn
    org.hibernate.tool.schema: debug
    org.springframework.security: INFO
    org.springdoc: ERROR
    com.tasteam.batch.ai: DEBUG

ai:
  stub-enabled: ${AI_STUB_ENABLED:true}
  stub-delay: ${AI_STUB_DELAY:100ms}

naver:
  maps:
    base-url: https://maps.apigw.ntruss.com
    api-key-id: ${NAVER_MAPS_API_KEY_ID:dummy}
    api-key: ${NAVER_MAPS_API_KEY:dummy}

tasteam:
  analytics:
    bucket: ${ANALYTICS_S3_BUCKET:tasteam-analytics-local}
  message-queue:
    kafka:
      connector:
        user-activity-s3-sink:
          tasks-max: ${KAFKA_CONNECT_UA_S3_TASKS_MAX:1}
          flush-size: ${KAFKA_CONNECT_UA_S3_FLUSH_SIZE:100}
          rotate-interval-ms: ${KAFKA_CONNECT_UA_S3_ROTATE_INTERVAL_MS:60000}
          rotate-schedule-interval-ms: ${KAFKA_CONNECT_UA_S3_ROTATE_SCHEDULE_INTERVAL_MS:60000}
  ai:
    analysis:
      comparison-min-reviews: ${TASTEAM_AI_ANALYSIS_COMPARISON_MIN_REVIEWS:10}
      comparison-batch-size: ${TASTEAM_AI_ANALYSIS_COMPARISON_BATCH_SIZE:10}
  webhook:
    enabled: false
  firebase:
    enabled: ${FIREBASE_ENABLED:false}
    project-id: ${FIREBASE_PROJECT_ID:}
    service-account-base64: ${FIREBASE_SERVICE_ACCOUNT_BASE64:}
    service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:}
