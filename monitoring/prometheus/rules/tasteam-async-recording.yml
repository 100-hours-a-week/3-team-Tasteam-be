groups:
  - name: tasteam_async_recording
    interval: 30s
    rules:
      - record: tasteam:notification_consumer_success_ratio_5m
        expr: |
          (sum(increase(notification_consumer_process_total{result="success"}[5m])) or vector(0))
          /
          clamp_min((sum(increase(notification_consumer_process_total[5m])) or vector(0)), 1)

      - record: tasteam:notification_consumer_dlq_5m
        expr: sum(increase(notification_consumer_dlq_total{result="success"}[5m]))
